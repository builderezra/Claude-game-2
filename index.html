<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#11102b">
<meta name="description" content="ZENITH — stack to the sky. A one-touch precision tower game.">
<meta property="og:title" content="ZENITH — Stack to the Sky">
<meta property="og:description" content="A one-touch precision tower game. Tap to drop, stack to the sky.">
<meta property="og:type" content="website">
<meta property="og:image" content="docs/screenshots/gameplay.png">
<title>ZENITH</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #11102b;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  canvas#game {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    color: #fff;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity .38s ease, visibility .38s;
  }
  .screen.visible { opacity: 1; visibility: visible; }

  /* ---------- HUD ---------- */
  #hud { justify-content: flex-start; }
  #hud-score {
    margin-top: calc(var(--safe-top) + 6vh);
    font-size: clamp(56px, 17vw, 110px);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: rgba(255,255,255,.96);
    text-shadow: 0 4px 24px rgba(0,0,0,.25);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  #hud-score.bump { animation: score-pop .18s ease-out; }
  @keyframes score-pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  #hud-combo {
    margin-top: 8px;
    font-size: clamp(13px, 3.6vw, 17px);
    font-weight: 700;
    letter-spacing: .32em;
    text-indent: .32em;
    text-transform: uppercase;
    color: #ffe27a;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity .25s ease, transform .25s ease;
  }
  #hud-combo.visible { opacity: 1; transform: translateY(0); }
  #hud-combo.bump { animation: combo-pop .22s ease-out; }
  @keyframes combo-pop {
    0% { transform: scale(1); }
    45% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  /* ---------- Title ---------- */
  #title { justify-content: space-between; }
  .title-top {
    margin-top: calc(var(--safe-top) + 11vh);
    display: flex; flex-direction: column; align-items: center;
  }
  #logo {
    font-size: clamp(44px, 14vw, 92px);
    font-weight: 800;
    letter-spacing: .14em;
    text-indent: .14em;
    background: linear-gradient(180deg, #ffffff 30%, #ffd9a0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 6px 28px rgba(255, 180, 90, .25));
  }
  #tagline {
    margin-top: 10px;
    font-size: clamp(11px, 3vw, 14px);
    font-weight: 600;
    letter-spacing: .42em;
    text-indent: .42em;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
  }
  #best-chip {
    margin-top: 26px;
    padding: 9px 22px;
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 999px;
    font-size: clamp(12px, 3.2vw, 15px);
    font-weight: 700;
    letter-spacing: .18em;
    text-indent: .18em;
    text-transform: uppercase;
    color: rgba(255,255,255,.85);
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(6px);
  }
  #tap-hint {
    font-size: clamp(14px, 4vw, 18px);
    font-weight: 700;
    letter-spacing: .38em;
    text-indent: .38em;
    text-transform: uppercase;
    color: rgba(255,255,255,.9);
    animation: pulse 1.9s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: .95; transform: scale(1); }
    50% { opacity: .45; transform: scale(.97); }
  }
  .title-bottom {
    margin-bottom: calc(var(--safe-bottom) + 4.5vh);
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  #themes {
    display: flex; gap: 14px;
    pointer-events: auto;
  }
  .theme-dot {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.25);
    position: relative;
    cursor: pointer;
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .theme-dot.active {
    border-color: #fff;
    transform: scale(1.18);
    box-shadow: 0 0 16px rgba(255,255,255,.45);
  }
  .theme-dot.locked { opacity: .38; }
  .theme-dot.locked::after {
    content: attr(data-unlock);
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
    color: rgba(255,255,255,.92);
    text-shadow: 0 1px 3px rgba(0,0,0,.6);
  }
  #stats-line {
    font-size: clamp(10px, 2.7vw, 12px);
    font-weight: 600;
    letter-spacing: .2em;
    text-indent: .2em;
    text-transform: uppercase;
    color: rgba(255,255,255,.4);
  }
  #theme-toast {
    position: absolute;
    left: 50%;
    bottom: calc(var(--safe-bottom) + 17vh);
    transform: translateX(-50%) translateY(8px);
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(0,0,0,.45);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .14em;
    text-indent: .14em;
    text-transform: uppercase;
    color: #fff;
    opacity: 0;
    transition: opacity .3s ease, transform .3s ease;
    white-space: nowrap;
  }
  #theme-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- Game over ---------- */
  #gameover { justify-content: center; }
  #go-card {
    display: flex; flex-direction: column; align-items: center;
    padding: 26px 44px 30px;
    border-radius: 28px;
    background: rgba(12, 8, 34, .38);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.1);
    transform: translateY(12px);
    transition: transform .45s cubic-bezier(.22,1.4,.36,1);
  }
  #gameover.visible #go-card { transform: translateY(0); }
  #go-label {
    font-size: clamp(12px, 3.2vw, 15px);
    font-weight: 700;
    letter-spacing: .42em;
    text-indent: .42em;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
  }
  #go-score {
    margin-top: 4px;
    font-size: clamp(72px, 24vw, 150px);
    font-weight: 800;
    line-height: 1.05;
    color: #fff;
    text-shadow: 0 6px 30px rgba(0,0,0,.35);
    font-variant-numeric: tabular-nums;
  }
  #go-best {
    margin-top: 6px;
    font-size: clamp(13px, 3.6vw, 17px);
    font-weight: 700;
    letter-spacing: .22em;
    text-indent: .22em;
    text-transform: uppercase;
    color: rgba(255,255,255,.7);
  }
  #go-close {
    margin-top: 10px;
    font-size: clamp(11px, 3.1vw, 14px);
    font-weight: 700;
    letter-spacing: .18em;
    text-indent: .18em;
    text-transform: uppercase;
    color: #ffb8c8;
    display: none;
  }
  #go-close.visible { display: block; }
  #new-best {
    margin-top: 18px;
    padding: 10px 26px;
    border-radius: 999px;
    background: linear-gradient(90deg, #ffb347, #ffd96a);
    color: #4a2a00;
    font-size: clamp(13px, 3.8vw, 17px);
    font-weight: 800;
    letter-spacing: .26em;
    text-indent: .26em;
    text-transform: uppercase;
    box-shadow: 0 6px 30px rgba(255, 190, 80, .5);
    display: none;
    animation: newbest-pop .55s cubic-bezier(.22,1.6,.36,1);
  }
  #new-best.visible { display: block; }
  @keyframes newbest-pop {
    0% { transform: scale(.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  #unlock-note {
    margin-top: 14px;
    font-size: clamp(11px, 3vw, 13px);
    font-weight: 700;
    letter-spacing: .2em;
    text-indent: .2em;
    text-transform: uppercase;
    color: #9fe8ff;
    display: none;
  }
  #unlock-note.visible { display: block; }
  #share-btn {
    margin-top: 18px;
    padding: 9px 26px;
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.9);
    font-family: inherit;
    font-size: clamp(11px, 3vw, 13px);
    font-weight: 700;
    letter-spacing: .22em;
    text-indent: .22em;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: auto;
    transition: background .2s, transform .15s;
  }
  #share-btn:active { transform: scale(.94); background: rgba(255,255,255,.18); }
  #go-hint {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 9vh);
    font-size: clamp(12px, 3.4vw, 15px);
    font-weight: 700;
    letter-spacing: .34em;
    text-indent: .34em;
    text-transform: uppercase;
    color: rgba(255,255,255,.65);
    animation: pulse 1.9s ease-in-out infinite;
    opacity: 0;
    transition: opacity .3s;
  }
  #go-hint.visible { opacity: 1; }

  /* ---------- Sound toggle ---------- */
  #sound-btn {
    position: absolute;
    top: calc(var(--safe-top) + 16px);
    right: 18px;
    width: 44px; height: 44px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,.1);
    backdrop-filter: blur(6px);
    color: rgba(255,255,255,.9);
    font-size: 19px;
    cursor: pointer;
    pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
  }
  #sound-btn:active { transform: scale(.9); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <!-- gameplay HUD -->
  <div id="hud" class="screen">
    <div id="hud-score">0</div>
    <div id="hud-combo">Perfect ×2</div>
  </div>

  <!-- title -->
  <div id="title" class="screen">
    <div class="title-top">
      <div id="logo">ZENITH</div>
      <div id="tagline">Stack to the sky</div>
      <div id="best-chip">Best · 0</div>
    </div>
    <div id="tap-hint">Tap to start</div>
    <div class="title-bottom">
      <div id="themes"></div>
      <div id="stats-line"></div>
    </div>
    <div id="theme-toast"></div>
  </div>

  <!-- game over -->
  <div id="gameover" class="screen">
    <div id="go-card">
      <div id="go-label">Score</div>
      <div id="go-score">0</div>
      <div id="go-best">Best · 0</div>
      <div id="go-close"></div>
      <div id="new-best">New Best!</div>
      <div id="unlock-note"></div>
      <button id="share-btn">Share</button>
    </div>
    <div id="go-hint">Tap to play again</div>
  </div>

  <button id="sound-btn" aria-label="Toggle sound">♪</button>
</div>
<script src="game.js"></script>
</body>
</html>
